<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="./src/assets/ico/hotel-sign.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html,
      body {
        min-height: 100%;
      }

      html.light,
      body.light {
        background-color: rgb(248, 247, 247);
      }

      html.dark,
      body.dark {
        background-color: rgb(37, 37, 37);
      }
    </style>
    <script>
      (function () {
        try {
          var savedTheme = localStorage.getItem("theme");
          var legacyMode = localStorage.getItem("mode");
          var theme =
            savedTheme === "light" || savedTheme === "dark"
              ? savedTheme
              : legacyMode === "true"
                ? "dark"
                : "light";
          var root = document.documentElement;
          root.classList.remove("light", "dark", "ligth");
          root.classList.add(theme);
          root.style.backgroundColor =
            theme === "dark" ? "rgb(37, 37, 37)" : "rgb(248, 247, 247)";
        } catch (err) {}
      })();
    </script>
    <title>Hotel'iko</title>
  </head>
  <body class="bodyClass">
    <script>
      (function () {
        var theme = document.documentElement.classList.contains("dark")
          ? "dark"
          : "light";
        document.body.classList.remove("light", "dark", "ligth");
        document.body.classList.add(theme);
        document.body.style.backgroundColor =
          theme === "dark" ? "rgb(37, 37, 37)" : "rgb(248, 247, 247)";
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
